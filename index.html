<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Normalizer Pro</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
            font-weight: 700;
        }

        .header p {
            color: var(--text-sub);
            font-size: 0.9rem;
            margin: 0;
        }

        .main-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .main-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .main-btn:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            height: 1.2rem;
            color: var(--primary);
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .lang-selector {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .lang-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-sub);
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 非表示のバッファ用 */
        #hidden-area {
            position: absolute;
            left: -9999px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="ui-title">書式削除コピー</h1>
        <p id="ui-desc">クリップボードから自動取得してプレーン化します</p>
    </div>

    <button class="main-btn" onclick="processClipboard()">
        <span id="ui-btn-text">変換してコピー</span>
    </button>

    <div id="status" class="status">Success!</div>

    <div class="lang-selector">
        <button class="lang-btn active" onclick="setLang('ja')">JP</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('zh')">CN</button>
    </div>
</div>

<div id="hidden-area" contenteditable="true"></div>

<script>
    const i18n = {
        ja: {
            title: "書式削除コピー",
            desc: "クリックで自動取得、変換、コピーを完了",
            btn: "変換してコピー",
            success: "完了（書式を削除しました）",
            fail: "クリップボードへのアクセスが拒否されました"
        },
        en: {
            title: "Format Stripper",
            desc: "Auto-fetch, Clean, and Copy in one click",
            btn: "Clean & Copy",
            success: "Clean text copied to clipboard!",
            fail: "Clipboard access denied"
        },
        zh: {
            title: "格式清除器",
            desc: "自动获取、转换、并重新复制",
            btn: "清除并复制",
            success: "已复制纯文本内容！",
            fail: "无法访问剪贴板"
        }
    };

    function setLang(lang) {
        document.getElementById('ui-title').innerText = i18n[lang].title;
        document.getElementById('ui-desc').innerText = i18n[lang].desc;
        document.getElementById('ui-btn-text').innerText = i18n[lang].btn;
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.toLowerCase() === (lang === 'ja' ? 'jp' : lang));
        });
        window.currentLang = lang;
    }
    window.currentLang = 'ja';

    async function processClipboard() {
        const statusEl = document.getElementById('status');
        
        try {
            // 1. クリップボードからデータを取得
            const items = await navigator.clipboard.read();
            let plainText = "";

            for (const item of items) {
                // HTML形式があれば優先的に取得してタグを除去
                if (item.types.includes("text/html")) {
                    const blob = await item.getType("text/html");
                    const html = await blob.text();
                    const temp = document.createElement("div");
                    temp.innerHTML = html;
                    plainText = temp.innerText || temp.textContent;
                    break;
                } 
                // なければ通常のテキストとして取得
                else if (item.types.includes("text/plain")) {
                    const blob = await item.getType("text/plain");
                    plainText = await blob.text();
                }
            }

            if (!plainText) return;

            // 2. クリーンなテキストを書き戻す
            await navigator.clipboard.writeText(plainText.trim());

            // 3. UIフィードバック
            statusEl.innerText = i18n[window.currentLang].success;
            statusEl.style.opacity = "1";
            setTimeout(() => { statusEl.style.opacity = "0"; }, 2000);

        } catch (err) {
            console.error(err);
            alert(i18n[window.currentLang].fail);
        }
    }
</script>

</body>
</html>
