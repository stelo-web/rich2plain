<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テキスト正規化ツール</title>
<style>
body {
    font-family: sans-serif;
    background: #f5f5f5;
    padding: 20px;
}
.container {
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
textarea {
    width: 100%;
    height: 150px;
    margin-bottom: 10px;
    padding: 10px;
    font-size: 14px;
}
button {
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
    <h2>書式削除コピー</h2>
    <textarea id="input" placeholder="ここに貼り付け（太字・色付きOK）"></textarea>
    <button onclick="convert()">プレーンテキストでコピー</button>
</div>

<script>
function convert() {
    const input = document.getElementById("input").value;

    // HTMLとして一度解釈
    const temp = document.createElement("div");
    temp.innerHTML = input;

    // 書式を排除した純テキスト取得
    const plainText = temp.innerText;

    // クリップボードにコピー
    navigator.clipboard.writeText(plainText).then(() => {
        alert("コピー完了（書式削除済み）");
    }).catch(() => {
        alert("コピー失敗");
    });
}
</script>

</body>
</html>
